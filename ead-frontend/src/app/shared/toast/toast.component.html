@if (toastService.currentToast(); as toast) {
  <div class="toast-wrapper">
    <div class="toast-card" [class]="'toast-' + toast.type">
      <div class="icon-container-wrapper">
        <div class="icon-container">
          @if (toast.type === 'success') {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-check"><path d="M20 6 9 17l-5-5"/></svg>
          } @else if (toast.type === 'error') {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          } @else if (toast.type === 'info') {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          }
        </div>
      </div>
      
      <div class="toast-body">
        <h4 class="toast-title">
          @if (toast.type === 'success') { Success }
          @else if (toast.type === 'error') { Error }
          @else { Notification }
        </h4>
        <p class="toast-message">{{ toast.message }}</p>
      </div>
      
      <button class="close-btn" (click)="toastService.hide()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>

      <div class="progress-bar"></div>
    </div>
  </div>
}
